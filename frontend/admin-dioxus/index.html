<!doctype html>
<html lang="en" class="dark h-full">
    <head>
        <title>{app_title}</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="UTF-8" />
        <!--
            M-8: Content-Security-Policy. This admin WASM SPA renders
            server-supplied post HTML via dangerous_inner_html (client-side
            ammonia sanitizes it — see src/screens/posts/view/components), so
            script-src 'self' blocks any injected <script>/event-handler from
            executing even if sanitization is bypassed. No inline script is
            needed (the runtime is a same-origin WASM module); style-src allows
            the inline styles + Google Fonts the app injects. The same policy
            is mirrored as a Traefik `headers` middleware (spa-csp-headers@file)
            for centralized prod enforcement; this <meta> is the enforced
            fallback for any serving path that does not route through it.
        -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
        />
    </head>
    <body class="antialiased min-h-full flex flex-col">
        <div id="main"></div>
    </body>
</html>
